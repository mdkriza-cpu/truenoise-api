ervices:
  - type: web
    name: aircraft-noise-tracker-api
    runtime: python
    pythonVersion: "3.11.9"
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DB_PATH
        value: /var/data/noise_tracker.db
    disk:
      name: noise-db
      mountPath: /var/data
      sizeGB: 1
